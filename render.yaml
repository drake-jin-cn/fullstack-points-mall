# render.yaml — Render Blueprint for Points Mall
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# Set up a Project with two environments: dev / prod.
# For each environment, override env vars in the dashboard.
#
# Env vars marked  sync: false  must be set manually per environment:
#   dev  → Neon dev branch host + credentials
#   prod → Neon prod branch host + credentials
#
# Services that need a Dockerfile first (Java / PHP):
#   points-mall-core, points-mall-shop, points-mall-thirdparty-connector

services:
  # ── BFF (NestJS) ────────────────────────────────────────────
  - type: web
    name: points-mall-bff
    runtime: docker
    dockerfilePath: ./points-mall-bff/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      - key: REDIS_PASSWORD
        sync: false
      - key: CORE_SERVICE_URL
        sync: false
      - key: SHOP_SERVICE_URL
        sync: false
      - key: MESSAGE_SERVICE_URL
        sync: false
      - key: DATA_SERVICE_URL
        sync: false
      - key: THIRDPARTY_SERVICE_URL
        sync: false

  # ── Message (Express/TypeScript) ────────────────────────────
  - type: web
    name: points-mall-message
    runtime: docker
    dockerfilePath: ./points-mall-message/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8082

  # ── Data (Python / FastAPI) ─────────────────────────────────
  - type: web
    name: points-mall-data
    runtime: docker
    dockerfilePath: ./points-mall-data/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: PORT
        value: 8083
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: neondb
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_PARAMS
        value: "?sslmode=require"
      - key: BFF_INTERNAL_URL
        sync: false

  # ── Frontend (Next.js) ──────────────────────────────────────
  - type: web
    name: points-mall-frontend
    runtime: docker
    dockerfilePath: ./points-mall-frontend/Dockerfile
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: NEXT_PUBLIC_BFF_URL
        sync: false

  # ── Core (Spring Boot) — create Dockerfile first ────────────
  - type: web
    name: points-mall-core
    runtime: docker
    dockerfilePath: ./points-mall-core/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: neondb
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_PARAMS
        value: "?sslmode=require"
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      - key: REDIS_PASSWORD
        sync: false

  # ── Shop (Laravel/PHP) — create Dockerfile first ────────────
  - type: web
    name: points-mall-shop
    runtime: docker
    dockerfilePath: ./points-mall-shop/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: PORT
        value: 8081
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: neondb
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: PGSSLMODE
        value: require
      - key: CACHE_DRIVER
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      - key: REDIS_PASSWORD
        sync: false

  # ── Thirdparty Connector (Spring Boot) — create Dockerfile first
  - type: web
    name: points-mall-thirdparty-connector
    runtime: docker
    dockerfilePath: ./points-mall-thirdparty-connector/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8084
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: AMAZON_PA_ACCESS_KEY
        sync: false
      - key: AMAZON_PA_SECRET_KEY
        sync: false
      - key: AMAZON_PA_PARTNER_TAG
        sync: false
      - key: AMAZON_PA_REGION
        value: us-east-1
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: noreply@points-mall.com
