name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/points-mall

jobs:
  # ─── Build & push Docker images to GHCR ─────────────────────────────────────
  build-bff:
    name: Build BFF image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: points-mall-bff
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-bff:${{ github.sha }},${{ env.IMAGE_PREFIX }}-bff:latest

  build-core:
    name: Build Core image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: points-mall-core
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-core:${{ github.sha }},${{ env.IMAGE_PREFIX }}-core:latest

  build-shop:
    name: Build Shop image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: points-mall-shop
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-shop:${{ github.sha }},${{ env.IMAGE_PREFIX }}-shop:latest

  build-message:
    name: Build Message image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: points-mall-message
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-message:${{ github.sha }},${{ env.IMAGE_PREFIX }}-message:latest

  build-data:
    name: Build Data image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: points-mall-data
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-data:${{ github.sha }},${{ env.IMAGE_PREFIX }}-data:latest

  build-thirdparty:
    name: Build Thirdparty image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: points-mall-thirdparty-connector
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-thirdparty:${{ github.sha }},${{ env.IMAGE_PREFIX }}-thirdparty:latest

  build-frontend:
    name: Build Frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: points-mall-frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }},${{ env.IMAGE_PREFIX }}-frontend:latest

  # ─── Deploy to VPS via SSH ───────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs:
      - build-bff
      - build-core
      - build-shop
      - build-message
      - build-data
      - build-thirdparty
      - build-frontend
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /srv/points-mall
            docker compose pull
            docker compose up -d --no-build
            docker image prune -f
